<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UMD Component Test</title>
  <style>
    html,body {
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    h1 {
      color: #333;
    }

    h2 {
      margin-top: 30px;
      margin-bottom: 15px;
      color: #444;
    }

    .btn {
      margin: 5px;
    }

    .debug-info {
      background-color: #f5f5f5;
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>

<body>
  <div id="app">
    <custom-head></custom-head>
    <custom-button type="primary" @click="handleClick"></custom-button>
    <custom-button type="secondary" text="Secondary Button"></custom-button>
    <custom-input v-model="inputValue" placeholder="Please enter content"></custom-input>
    <p>Input value: {{ inputValue }}</p>
  </div>

  <script src="./vue.js"></script>
  <script src="./dist/CustomButton.umd.js"></script>
  <script src="./dist/CustomInput.umd.js"></script>
  <script src="./dist/CustomHead.umd.js"></script>
  <script>
    const { createApp, ref } = Vue;
    createApp({
      components: {
        'custom-button': CustomButton,
        'custom-input': CustomInput,
        'custom-head':CustomHead,
      },
      setup() {
        const inputValue = ref('');
        return {
          inputValue
        };
      },
      methods: {
        handleClick() {
          alert('Button clicked!');
        }
      }
    }).mount('#app');
  </script>
</body>

</html>
